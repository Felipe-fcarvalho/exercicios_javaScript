<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando números</title>
    <style>
        body {
            font: bold 20px sans-serif;
        }

        input {
            padding: 8px;
            margin-bottom: 10px;
            background-color: #f8f6f6;
            border: none;
            border-radius: 4px;
            box-shadow: inset 1px 1px 5px 1px rgba(0, 0, 0, 0.2);
        }

        button {
            background-color: rgb(30, 90, 253);
            color: white;
            font-weight: bold;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

    </style>
</head>
<body>
    <h1>Somando Valores</h1>
    <input type="number" name="txtn1" id="txtn1"> +
    <input type="number" name="txtn2" id="txtn2">
    <button type="button" value="Somar" onclick="somar()">Somar</button>
    <div id="res">Resultado</div>

    <script>
        function somar(){
            let tn1 = document.getElementById('txtn1')
            let tn2 = document.getElementById('txtn2')
            let res = document.getElementById('res')
            let n1 = Number(tn1.value)
            let n2 = Number(tn2.value)
            let s = n1 + n2 
            res.innerHTML = `A soma de ${n1} + ${n2} é igual a:  ${s}`
        }
    </script>
</body>
</html>
