<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto JavaScript 2</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <header>
        <h1>Verificador de Idade</h1>
    </header>
    <section class="container">
        <form id="form">
                <div>
                    <label for="txtano">Ano de Nascimento: </label><input type="number" id="txtano" required min="0">
                </div>
                <div id="sexo">
                    <span>Sexo:</span>
                    <input type="radio" name="sex" id="mas" required checked>
                    <label for="mas">Masculino</label>
                    <input type="radio" name="sex" id="fem" required>
                    <label for="fem">Feminino</label>
                </div>
                <button type="submit">Verificar</button>
                <div id="res">
                    <p>Preencha os dados acima para ver o resultado!</p>
                </div>
        </form>
    </section>
    <footer>Feito por &copy; Felipe Ferreira Carvalho</footer>
    <script src="main.js"></script>
</body>
</html>
