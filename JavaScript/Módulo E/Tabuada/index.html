<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto JavaScript 2</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <header>
        <h1>Contagem</h1>
    </header>
    <section class="container">
        <form id="form">
                <div class="campo">
                    <label for="num">Número: </label>
                    <input type="number" id="num" placeholder="Escolha a tabuada" min="0">
                    <button type="submit" onclick="validaTabuada()">Gerar tabuada</button>
                </div>
                <div>
                    <select name="tabuada" id="seltab" size="10">
                    </select>
                </div>
        </form>
    </section>
    <footer>Feito por &copy; Felipe Ferreira Carvalho</footer>
    <script src="main.js"></script>
</body>
</html>
